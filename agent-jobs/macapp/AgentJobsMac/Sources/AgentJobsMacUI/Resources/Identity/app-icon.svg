<?xml version="1.0" encoding="UTF-8"?>
<!--
  Agent Jobs app icon (cycle-1 placeholder).
  1024-equivalent canvas. A rounded-rect tile (squircle-ish via rx) in
  brand-green carries the same monoline "stack" metaphor as the menubar
  glyph, but in colored / layered form. Distinct from the menubar
  template per iStat-Menus lesson (architecture §1).
  Real glyph design lands cycle-2 after ui-critic feedback.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- background tile -->
  <rect x="32" y="32" width="960" height="960" rx="220" fill="#2A8C4A"/>
  <!-- inner highlight band -->
  <rect x="32" y="32" width="960" height="480" rx="220" fill="#34A85B"/>
  <!-- stack rows (white) -->
  <rect x="220" y="300" width="500" height="80" rx="40" fill="white"/>
  <rect x="220" y="460" width="640" height="80" rx="40" fill="white"/>
  <rect x="220" y="620" width="380" height="80" rx="40" fill="white"/>
  <!-- status dot anchor -->
  <circle cx="800" cy="340" r="60" fill="#FFD43B"/>
</svg>
