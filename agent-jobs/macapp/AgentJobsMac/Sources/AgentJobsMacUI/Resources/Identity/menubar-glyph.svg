<?xml version="1.0" encoding="UTF-8"?>
<!--
  Agent Jobs menubar glyph (cycle-2 final).
  16pt logical canvas, monoline black-on-clear; AppKit's template-render
  path strips color and tints by appearance.

  Concept: a centered "service tray" — a filled rounded square stamps
  the "background services watcher" identity at small sizes (the dense
  centre survives 16pt rendering and tints cleanly under both light
  and dark menubars). Two thin negative-space slits split the tray
  into a header / body / footer, hinting at a stack of running rows;
  a small "running" notch on the right edge anchors the count-badge.

  Geometry is tuned so the central 8x8 region of the rendered 22x22
  capture is ≥ 80% glyph pixels (AC-V-01 luma < 0.2 over white,
  AC-V-04 luma > 0.7 over dark when template-tinted to white).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Tray body: rounded square filling 14x14 of the 16pt canvas. -->
  <rect x="1" y="1" width="14" height="14" rx="2.5" ry="2.5" fill="black"/>
  <!-- Header / body separator slit (1px tall, just above the central band). -->
  <rect x="3" y="3" width="10" height="1" fill="white"/>
  <!-- Body / footer separator slit (1px tall, just below the central band). -->
  <rect x="3" y="12" width="10" height="1" fill="white"/>
  <!-- Status notch on right edge of the body (negative space). -->
  <circle cx="11.5" cy="8" r="1" fill="white"/>
  <!-- "Running" indicator dot (overhangs right edge, badge anchor). -->
  <circle cx="14" cy="4" r="1.5" fill="black"/>
</svg>
