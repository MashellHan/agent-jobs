<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="nio">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="nio 智能语音助手">
  <meta name="format-detection" content="telephone=no">

  <title>nio 语音助手</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.png">
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Header -->
  <header id="status-bar">
    <div id="app-brand">
      <svg id="app-logo" viewBox="0 0 32 32" width="28" height="28" aria-hidden="true">
        <circle cx="16" cy="16" r="16" fill="#6c63ff"/>
        <rect x="11" y="8" width="10" height="10" rx="5" fill="white"/>
        <path d="M9 18 Q9 25 16 25 Q23 25 23 18" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <rect x="14.5" y="25" width="3" height="4" rx="1" fill="white"/>
        <rect x="11" y="29" width="10" height="2.5" rx="1.25" fill="white"/>
      </svg>
      <span id="app-title">nio 语音助手</span>
    </div>
    <div id="connection-chip" class="connecting" aria-live="polite">
      <span class="dot"></span>
      <span id="connection-label">连接中</span>
    </div>
  </header>

  <!-- Transcript / Chat Area -->
  <main id="chat-area" role="log" aria-live="polite" aria-label="对话历史"></main>

  <!-- Bottom Controls -->
  <footer id="bottom-bar">
    <!-- Status pill -->
    <div id="status-pill" class="idle" role="status" aria-live="polite">
      <span id="status-text">待机中</span>
    </div>

    <!-- Audio visualizer canvas -->
    <div id="visualizer-wrap" aria-hidden="true">
      <canvas id="visualizer" width="280" height="60"></canvas>
    </div>

    <!-- Mic button -->
    <button
      id="mic-btn"
      aria-label="按住说话"
      aria-pressed="false"
      title="点击开始 / 停止录音"
    >
      <span class="mic-icon" aria-hidden="true">
        <!-- Mic SVG -->
        <svg id="icon-mic" viewBox="0 0 24 24" width="48" height="48" fill="white">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10 Q5 17 12 17 Q19 17 19 10" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
          <rect x="11" y="17" width="2" height="4" rx="1"/>
          <rect x="8" y="21" width="8" height="2" rx="1"/>
        </svg>
        <!-- Stop SVG (hidden by default) -->
        <svg id="icon-stop" viewBox="0 0 24 24" width="48" height="48" fill="white" style="display:none">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
        <!-- Speaker SVG (hidden by default) -->
        <svg id="icon-speaker" viewBox="0 0 24 24" width="48" height="48" fill="white" style="display:none">
          <path d="M3 9v6h4l5 5V4L7 9H3z"/>
          <path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12z" opacity="0.7"/>
          <path d="M14 3.23v2.06A7 7 0 0 1 19 12a7 7 0 0 1-5 6.71v2.06A9 9 0 0 0 21 12a9 9 0 0 0-7-8.77z" opacity="0.4"/>
        </svg>
      </span>
    </button>

    <p id="hint-text">点击麦克风开始说话</p>
  </footer>

  <!-- Toast notification -->
  <div id="toast" role="alert" aria-live="assertive"></div>

  <script src="/app.js"></script>
</body>
</html>
